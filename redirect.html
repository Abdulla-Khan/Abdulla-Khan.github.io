<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      const productId = window.location.pathname.split("/").pop();
      const fallbackUrl =
        "https://play.google.com/store/apps/details?id=com.softthree.studly";
      const iosAppStoreUrl =
        "https://apps.apple.com/pk/app/studly/id6736399909";

      const isIOS =
        /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      // 🔥 Use your custom URI scheme or app link domain
      const deepLink = `fitted://product/${productId}`;

      // Try opening the app
      window.location.href = deepLink;

      // Fallback after 1.5s
      setTimeout(() => {
        window.location.href = isIOS ? iosAppStoreUrl : fallbackUrl;
      }, 1500);
    </script>
  </head>
  <body>
    <p>Redirecting to the app...</p>
  </body>
</html>
