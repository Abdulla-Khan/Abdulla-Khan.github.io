<!DOCTYPE html>
<html>
  <head>
    <title>Redirecting...</title>
    <meta charset="utf-8" />
    <script>
      const path = window.location.pathname; // e.g. /products/abc123
      const fullUrl = `https://abdulla-khan.github.io${path}`;

      // Attempt to open in app
      window.location.href = fullUrl;

      // Fallback to Play Store if app not installed
      setTimeout(function () {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.example.fitted";
      }, 1500);
    </script>
  </head>
  <body>
    <p>Redirecting to app...</p>
  </body>
</html>
